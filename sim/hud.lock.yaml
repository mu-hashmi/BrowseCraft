tools:
- name: player_position
  description: Return the current simulated player position and facing.
  inputSchema:
    properties: {}
    type: object
- name: player_inventory
  description: Return the simulated player inventory summary.
  inputSchema:
    properties: {}
    type: object
- name: inspect_area
  description: Inspect blocks around a center point within a cubic radius.
  inputSchema:
    properties:
      center:
        additionalProperties:
          type: integer
        type: object
      radius:
        type: integer
      detailed:
        default: false
        type: boolean
      filter_terrain:
        default: true
        type: boolean
    required:
    - center
    - radius
    type: object
- name: place_blocks
  description: Place explicit block placements at the given coordinates.
  inputSchema:
    properties:
      placements:
        items:
          additionalProperties: true
          type: object
        type: array
    required:
    - placements
    type: object
- name: fill_region
  description: Fill an axis-aligned region, inclusive of both corners, with one block
    type.
  inputSchema:
    properties:
      from_corner:
        additionalProperties:
          type: integer
        type: object
      to_corner:
        additionalProperties:
          type: integer
        type: object
      block_id:
        type: string
    required:
    - from_corner
    - to_corner
    - block_id
    type: object
- name: undo_last
  description: Undo the most recent world-modifying action.
  inputSchema:
    properties: {}
    type: object
- name: get_active_overlay
  description: Return the currently loaded overlay blueprint, if one exists.
  inputSchema:
    properties: {}
    type: object
- name: modify_overlay
  description: Transform the active overlay with rotation, translation, pivot, or
    material swap operations.
  inputSchema:
    properties:
      op:
        type: string
      quarters:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
      dy:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
      x:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
      y:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
      z:
        anyOf:
        - type: integer
        - type: 'null'
        default: null
      from_block:
        anyOf:
        - type: string
        - type: 'null'
        default: null
      to_block:
        anyOf:
        - type: string
        - type: 'null'
        default: null
    required:
    - op
    type: object
- name: get_blueprints
  description: List saved blueprint names available in the simulator.
  inputSchema:
    properties: {}
    type: object
- name: save_blueprint
  description: Save the active overlay under a blueprint name.
  inputSchema:
    properties:
      name:
        type: string
    required:
    - name
    type: object
- name: load_blueprint
  description: Load a saved blueprint into the active overlay.
  inputSchema:
    properties:
      name:
        type: string
    required:
    - name
    type: object
- name: rl_setup_task
  description: Initialize a legacy HUD eval episode from an explicit RL task spec.
  inputSchema:
    properties:
      task_spec:
        additionalProperties: true
        type: object
      reward_config:
        anyOf:
        - additionalProperties: true
          type: object
        - type: 'null'
        default: null
    required:
    - task_spec
    type: object
- name: rl_grade_task
  description: Score the active legacy HUD eval episode and return reward details.
  inputSchema:
    properties: {}
    type: object
